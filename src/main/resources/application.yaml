spring:
  application:
    name: medid
  # Konfigurasi Database
  datasource:
    url: jdbc:postgresql://localhost:5432/medid
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver
    # Connection Pool (opsional, kalau pakai HikariCP default Spring Boot)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
  # JPA Hibernate Config
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # JWT Config
jwt:
  secret: ${JWT_SECRET} # set jwt secret di environment
  expiration: 86400000 # ms (1 day)

